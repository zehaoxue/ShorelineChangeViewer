<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Shoreline Change Viewer</title>

        <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>-->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

    <!-- Load Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Load Esri-Leaflet -->
    <script src="https://unpkg.com/esri-leaflet@3.0.14/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet-vector@4.2.8/dist/esri-leaflet-vector.js"></script>

    <script src="./resources/javascripts/Leaflet.MakiMarkers.js"></script>
    <script src="./resources/javascripts/utility.js"></script>


    <!-- leaflet plugin for adding location service and button -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol@0.84.1/dist/L.Control.Locate.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol@0.84.1/dist/L.Control.Locate.min.js" charset="utf-8"></script>


    <link rel="stylesheet" href="style.css"/>
    <script>
    </script>
</head>
<body>

<div id="infoModal" class="modal-background" onclick="UI.closeInfoModal()">
    <div class="modal-content">
        <button class="modal-close" onclick="UI.closeInfoModal()">×</button>
        <iframe src="info.html" class="modal-iframe"></iframe>
    </div>
</div>


<div id="main">

    <header>
        <strong>National Shoreline Change Viewer</strong>
        <span class="openbtn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></span>
    </header>

    <div id="mySidebar" class="sidebar">
        <a class="menu-button closebtn" id="menu-close">×</a>
        <a class="menu-button" id="menu-clear" >Clear Map</a>
        <a class="menu-button" id="menu-fullExtent">Reset Zoom</a>
        <a class="menu-button" id="menu-help">Help</a>
        <a class="menu-button" id="menu-author" href="http://44.225.111.109/Xue_Resume/index.html" target="_blank" rel="noopener noreferrer">Author</a>
    </div>


    <div style="width:100%; height: 100%;">
        <div id="mapId"></div>
    </div>
    <div id= "menuInfo" class="menuInfo">
        <button class="layer-button" id="ratesLT" type="button" title="Long-term (78+ years) rates of shoreline change for open-ocean shorelines of the United States ranging from 1800's to 2018.">Long-term rates</button>
        <button class="layer-button" id="ratesST" type="button" title="Short-term (~30 years) rates of shoreline change for open-ocean shorelines of the United States ranging from 1970's to 2018.">Short-term rates</button>
        <button class="layer-button" id="shorelines" type="button" title="Historical shoreline positions for ocean shorelines of the United States ranging from 1800's to present.">Historical shorelines</button>
    </div>

    <div id="loadingSpinner" class="loading-spinner hidden" title="Loading...">
        <div class="spinner"></div>
    </div>

    <script src="js/main.js"></script>
</div>
</body>
</html>
