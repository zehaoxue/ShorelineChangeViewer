<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Leaflet</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">

    <link rel="stylesheet prefetch" href="vendor/fontawesome-free-5.12.1-web/css/fontawesome.min.css"/>
    <link rel="stylesheet" href="vendor/fontawesome-free-5.12.1-web/css/solid.css"/>


    <!--    <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
        <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>-->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Load Esri Leaflet from CDN -->
    <script src="https://unpkg.com/esri-leaflet@3.0.14/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet-vector@4.2.8/dist/esri-leaflet-vector.js"></script>

    <script src="./resources/javascripts/Leaflet.MakiMarkers.js"></script>
    <script src="./resources/javascripts/utility.js"></script>
    <style>
        #mapId {
            width: 100%;
            height: 100%;
            position: absolute;
        }

        .leaflet-top .leaflet-control {
            margin-top: 80px;
        }

        #LeafletHeader {
            background-color: darkgray !important;
            margin-bottom: 50px;
            position: fixed;
            z-index: 1000;
            width: 100%;
        }

        .menuInfo {
            z-index: 1000;
            position: absolute;
            margin-top: 90px;
            margin-left: 75px;
            display: block
        }

    </style>
    <script>
    </script>
</head>
<body>
<div id="LeafletHeader" class="container-fluid alert-info">
    <section>
        <span style="font-size:2rem;cursor:pointer;display: block;float: left;margin-right:15px;" onclick="toggleNav()">☰</span>
        <span style="float:left;font-size:2rem;font-weight: Bold">GIS 2459 Bootstrap Leaflet Map </span>
    </section>
</div>
<div style="width:100%; height: 100%;">
    <div id="mapId"></div>
</div>
<div class="container-fluid menuInfo">
    <span class="button-circle-base">
        <button title="Full Extent" class="layer-button" type="button"><i id="FullExtent" style="color: red;" class="fas fa-2x fa-expand"></i></button>
        <button title="THC Regions" class="layer-button" id="Regions" type="button"><i style="color: red;" class="fas fa-2x fa-map"></i></button>
        <button title="THC Trails" class="layer-button" id="Trails" type="button"><i style="color: red;" class="fas fa-2x fa-hiking"></i></button>
        <button title="Wineries" class="layer-button" id="Wineries" type="button"><i style="color: red;" class="fas fa-2x fa-wine-bottle"></i></button>
        <button title="Breweries" class="layer-button" id="Breweries" type="button"><i style="color: red;" class="fas fa-2x fa-beer"></i></button>
        <button title="BBQ" class="layer-button" id="BBQ" type="button"><i style="color: red;" class="fas fa-2x fa-utensils"></i></button>
    </span>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
