<body>
<header>
    <span id="menuIcon" onclick="toggleNav()"><i class="fas fa-bars"></i></span>
    Texas Heritage Trails with BBQ, Breweries & Wineries
</header>

<div id="infoModal" class="modal-background">
    <div class="modal-content">
        <button class="modal-close" aria-label="Close" onclick="closeInfoModal()">×</button>
        <iframe src="info.html" class="modal-iframe"></iframe>
    </div>
</div>

<script>
    function setModalCookie() {
        document.cookie = "infoModalShown=true; path=/; max-age=2592000"
    }

    function hasSeenModal() {
        let cookies = document.cookie.split(';');
        for (let cookie of cookies){
            if(cookie.trim().startsWith("infoModalShown=true")) {
                return true;
            }
        }
        return false;
    }

    function closeInfoModal() {
        document.getElementById('infoModal').style.display = 'none';
        setModalCookie();
    }

    if (!hasSeenModal()) {
        document.getElementById('infoModal').style.display = 'flex';
    }

</script>
<div style="width:100%; height: 100%;">
    <div id="mapId"></div>
</div>
<div class="menuInfo">
    <span class="button-circle-base">
        <button title="Full Extent" class="layer-button" id="FullExtent" type="button"><i class="layer-button-inner fas fa-2x fa-expand"></i></button>
        <button title="THC Regions" class="layer-button" id="Region" type="button"><i class="layer-button-inner fas fa-2x fa-map"></i></button>
        <button title="THC Trails" class="layer-button" id="Trail" type="button"><i class="layer-button-inner fas fa-2x fa-hiking"></i></button>
        <button title="Wineries" class="layer-button" id="Winery" type="button"><i  class="layer-button-inner fas fa-2x fa-wine-bottle"></i></button>
        <button title="Breweries" class="layer-button" id="Brewery" type="button"><i class="layer-button-inner fas fa-2x fa-beer"></i></button>
        <button title="BBQ Stands" class="layer-button" id="BBQ" type="button"><i class="layer-button-inner fas fa-2x fa-utensils"></i></button>
    </span>
</div>
